[model]
name = "prometheus_multitask_v1"
in_channels = 3
num_tissue_classes = 6
num_nucleus_types = 10
encoder_dims = [96, 192, 384, 768]
encoder_depths = [3, 3, 9, 3]
tissue_decoder_depths = [1, 2, 2]
drop_path_rate = 0.2
nuclei_feature_stride = 4

[model.context]
enabled = true

[input]
image_size = 1024

[postprocess]
confidence_threshold = 0.25
max_detections = 1000
local_max_kernel = 3
# Minimum predicted-class softmax probability to keep a detection. 0.0 keeps the
# current behavior; raise it (or set a per-class list via class_confidence_thresholds)
# after running scripts/tune_nuclei_threshold.py against the k-fold validation set.
class_confidence_threshold = 0.0
# class_confidence_thresholds = [t_tumor, t_stroma, t_endothelium, t_histiocyte,
#   t_melanophage, t_lymphocyte, t_plasma_cell, t_neutrophil, t_apoptosis, t_epithelium]
